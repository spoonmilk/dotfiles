ame = "vague"
author = "Your Name"
description = "A theme inspired by vague.nvim for Helix"
license = "MIT"

[palette]
bg = "#18191a"
fg = "#cdcdcd"
floatBorder = "#878787"
line = "#282830"
comment = "#646477"
builtin = "#bad1ce"
func = "#be8c8c"
string = "#deb896"
number = "#d2a374"
property = "#c7c7d4"
constant = "#b4b4ce"
parameter = "#b9a3ba"
visual = "#363738"
error = "#d2788c"
warning = "#e6be8c"
hint = "#8ca0dc"
operator = "#96a3b2"
keyword = "#7894ab"
type = "#a1b3b9"
search = "#465362"
plus = "#8faf77"
delta = "#e6be8c"

[defaults]
background = "bg"
foreground = "fg"
selection = "visual"
cursor = "fg"
statusline = "line"
linenr = "comment"
linenr.selected = "fg"
gutter = "line"

[ui]
background = "bg"
text = "fg"
cursor = { fg = "bg", bg = "fg" }
cursor.primary = { fg = "bg", bg = "fg" }
cursor.primary.insert = { fg = "bg", bg = "keyword" }
cursor.primary.select = { fg = "bg", bg = "string" }
cursorline = "line"
selection = "visual"
statusline = "line"
statusline.inactive = "line"
statusline.normal = "fg"
statusline.insert = "keyword"
statusline.select = "string"
statusline.separator = "comment"
bufferline = "line"
bufferline.active = "fg"
bufferline.background = "line"
popup = "line"
menu = "line"
menu.selection = "visual"
gutter = "line"
gutter.selected = "fg"
linenr = "comment"
linenr.selected = "fg"
match = "search"
margin = "line"
scrollbar = "comment"
info = "hint"
warning = "warning"
error = "error"
debug.breakpoint = "error"
debug.active = "warning"
highlight.frameline = "warning"

[syntax]
attribute = "property"
type = "type"
type.builtin = "builtin"
type.parameter = "parameter"
type.enum = "type"
type.enum.variant = "constant"
type.constructor = "func"
constant = "constant"
constant.builtin = "builtin"
constant.boolean = "number"
constant.character = "string"
constant.character.escape = "operator"
constant.numeric = "number"
constant.numeric.integer = "number"
constant.numeric.float = "number"
string = "string"
string.special = "string"
string.path = "string"
string.url = "string"
string.symbol = "string"
comment = { fg = "comment", modifiers = ["italic"] }
comment.line = "comment"
comment.block = "comment"
comment.documentation = "comment"
variable = "fg"
variable.builtin = "builtin"
variable.parameter = "parameter"
variable.other = "fg"
variable.member = "property"
variable.label = "fg"
punctuation = "fg"
punctuation.delimiter = "fg"
punctuation.bracket = "fg"
punctuation.special = "fg"
keyword = "keyword"
keyword.control = "keyword"
keyword.conditional = "keyword"
keyword.repeat = "keyword"
keyword.import = "keyword"
keyword.return = "keyword"
keyword.exception = "keyword"
keyword.operator = "operator"
keyword.directive = "keyword"
function = "func"
function.builtin = "builtin"
function.method = "func"
function.macro = "func"
function.special = "func"
tag = "keyword"
tag.builtin = "builtin"
namespace = "fg"
namespace.special = "fg"
markup.heading = { fg = "fg", modifiers = ["bold"] }
markup.heading.1 = { fg = "fg", modifiers = ["bold"] }
markup.heading.2 = { fg = "fg", modifiers = ["bold"] }
markup.heading.3 = { fg = "fg", modifiers = ["bold"] }
markup.heading.4 = { fg = "fg", modifiers = ["bold"] }
markup.heading.5 = { fg = "fg", modifiers = ["bold"] }
markup.heading.6 = { fg = "fg", modifiers = ["bold"] }
markup.list = "fg"
markup.list.unnumbered = "fg"
markup.list.numbered = "fg"
markup.list.checked = "fg"
markup.list.unchecked = "fg"
markup.bold = { fg = "fg", modifiers = ["bold"] }
markup.italic = { fg = "fg", modifiers = ["italic"] }
markup.strikethrough = { fg = "fg", modifiers = ["crossed_out"] }
markup.link = "string"
markup.link.url = "string"
markup.link.label = "string"
markup.link.text = "string"
markup.quote = "fg"
markup.raw = "fg"
markup.inline = "fg"
markup.block = "fg"
diff.plus = "plus"
diff.plus.gutter = "plus"
diff.minus = "error"
diff.minus.gutter = "error"
diff.delta = "delta"
diff.moved = "fg"
diff.conflict = "warning"
diff.conflict.gutter = "warning"
