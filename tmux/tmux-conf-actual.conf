set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a last-window

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

bind-key -r -T prefix k resize-pane -U 5
bind-key -r -T prefix j resize-pane -D 5
bind-key -r -T prefix l resize-pane -L 5
bind-key -r -T prefix h resize-pane -R 5
bind-key -r -T prefix K resize-pane -U
bind-key -r -T prefix J resize-pane -D
bind-key -r -T prefix L resize-pane -L
bind-key -r -T prefix H resize-pane -R
bind -r m resize-pane -Z

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g focus-events on
setw -g aggressive-resize on

bind C-p previous-window
bind C-n next-window

bind R source-file '/home/svdv/.tmux.conf'

set-window-option -g automatic-rename

set-option -g status-style bg=default

bind-key x kill-pane

set -g detach-on-destroy off

set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour7"

set -g status-justify left
set -g status-style "bg=default,fg=colour7"
set -g status-interval 2

setw -g window-status-style "fg=colour8"
setw -g window-status-current-style "bg=colour7,fg=colour0"

set -g message-style "bg=colour0,fg=colour7"
set -g message-command-style "bg=colour0,fg=colour7"

setw -g mode-style "bg=colour8,fg=colour7"

set -g pane-border-lines "heavy"

set-option -g status-position bottom
setw -g window-status-format " #I #W "
setw -g window-status-current-format " [#I #W] "

set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

set -g clock-mode-color colour7

set -g status-right-length 100
set -g status-left ""

set -s set-clipboard on
set -ag terminal-overrides "vte*:XT:Ms=\\E]52;c;%p2%s\\7,xterm*:XT:Ms=\\E]52;c;%p2%s\\7"

unbind p
bind p paste-buffer -p
